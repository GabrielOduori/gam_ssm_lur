repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format
  - repo: local
    hooks:
      - id: no-ai-attribution
        name: Reject attribution in commit message
        entry: .tools/check_attribution.sh
        language: script
        stages: [commit-msg]
